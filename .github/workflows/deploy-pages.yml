name: Deploy InternTrack to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply InternTrack UI updates
        run: |
          python scripts/apply_company_calendar.py
          python scripts/even_dashboard_cards.py
          python scripts/monthly_attendance_pdf.py
          python scripts/integrate_report_entry_forms.py
          python scripts/filter_today_activity.py
          python scripts/fix_calendar_tab.py
          python scripts/pulse_shift_progress.py
          python scripts/fix_calendar_analog_clock.py
          python scripts/redesign_calendar_glass.py
          python scripts/apply_boot_screen_theme.py
          python scripts/optimize_calendar_fullscreen.py
          python scripts/replace_boot_spinner.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies from public npm
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: |
          rm -rf node_modules
          npm install --include=dev --package-lock=false --registry=https://registry.npmjs.org/
          test -x node_modules/.bin/vite
          ./node_modules/.bin/vite --version

      - name: Build static site
        run: ./node_modules/.bin/vite build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload built site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment_first
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retrying Pages deployment
        if: steps.deployment_first.outcome == 'failure'
        run: sleep 30

      - name: Retry GitHub Pages deployment
        id: deployment_retry
        if: steps.deployment_first.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Confirm first deployment succeeded
        if: steps.deployment_first.outcome == 'success'
        run: echo "GitHub Pages deployment completed successfully."
