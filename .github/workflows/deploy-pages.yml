name: Deploy InternTrack to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply company calendar and profile updates
        run: python scripts/apply_company_calendar.py

      - name: Commit upgraded source and backend
        run: |
          if ! git diff --quiet -- src/app/App.tsx apps-script/Code.gs; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/app/App.tsx apps-script/Code.gs
            git commit -m "Add PT KSB company holidays"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install build dependencies
        run: npm ci --include=dev

      - name: Build static site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload built site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
