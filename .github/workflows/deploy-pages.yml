name: Deploy InternTrack to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: interntrack-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply InternTrack UI updates
        run: |
          python scripts/apply_company_calendar.py
          python scripts/normalize_public_holidays.py
          python scripts/reflect_holidays_in_attendance.py
          python scripts/even_dashboard_cards.py
          python scripts/monthly_attendance_pdf.py
          python scripts/add_attendance_remarks.py
          python scripts/integrate_report_entry_forms.py
          python scripts/filter_today_activity.py
          python scripts/fix_calendar_tab.py
          python scripts/pulse_shift_progress.py
          python scripts/fix_calendar_analog_clock.py
          python scripts/redesign_calendar_glass.py
          python scripts/install_sweeping_calendar_clock.py
          python scripts/apply_boot_screen_theme.py
          python scripts/optimize_calendar_fullscreen.py
          python scripts/fix_calendar_mobile_fullscreen.py
          python scripts/install_month_calendar_below_dial.py
          python scripts/remove_month_calendar_helper_text.py
          python scripts/enable_desktop_scroll_smoothing.py
          python scripts/optimize_runtime_performance.py || echo "::warning::Performance optimization skipped; continuing deployment."
          python scripts/replace_boot_spinner.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies from public npm
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: |
          rm -rf node_modules
          npm install --include=dev --package-lock=false --registry=https://registry.npmjs.org/
          test -x node_modules/.bin/vite
          ./node_modules/.bin/vite --version

      - name: Build static site
        run: ./node_modules/.bin/vite build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload built site
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
