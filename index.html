<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>InternTrack</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Keep mobile browser chrome black while preserving the pink app UI. -->
    <meta name="theme-color" content="#000000" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#000000" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
    <meta name="color-scheme" content="dark light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="InternTrack" />

    <meta name="description" content="Tracks intern attendance with clock in/out, activity logs, and notes to streamline monitoring and enhance productivity management." />
    <meta name="robots" content="noindex, nofollow" />
    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
      @media (max-width: 767px) {
        html, body, #root { background: #000000; }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script src="./config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
